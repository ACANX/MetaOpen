name: UpdateBOMAIODeps

on:
  workflow_dispatch:          # 手动触发
  schedule:
    # 每天 UTC 时间 02:00 自动运行（可按需调整）
    - cron: '0 2 * * *'

permissions:
  contents: write             # 允许提交代码
  pull-requests: write        # 允许创建 PR

jobs:
  update-bom:
    runs-on: ubuntu-latest
    steps:
      - name: CheckoutRepository
        uses: actions/checkout@v5
        with:
          # 拉取完整历史，以便创建分支和 PR
          fetch-depth: 0

      - name: SetupJDK25
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: SetupPython314
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: InstallPython314Dependencies
        run: pip install lxml

      - name: GenerateEffectivePOMFromOrigin
        working-directory: meta-bom/bom-aio-origin
        run: |
          mvn help:effective-pom -Doutput=effective-pom.xml
          echo "Effective POM 文件已生成，文件位置 meta-bom/bom-aio-origin/effective-pom.xml"

      - name: UpdateTargetBOMDeps
        run: |
          echo "====================== Python脚本执行开始 ================================"
          python .github/Python/UpdateBomDependencies.py \
            --effective-pom meta-bom/bom-aio-origin/effective-pom.xml \
            --target-pom meta-bom/bom-aio/pom.xml
          echo "====================== Python脚本执行完成 ================================"

      - name: CheckForChanges
        id: git-check
        run: |
          git diff --quiet meta-bom/bom-aio/pom.xml || echo "changed=true" >> $GITHUB_OUTPUT

      - name: CreatePullRequest
        if: steps.git-check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(bom-aio): Sync dependencies from bom-aio-origin BOM "
          title: "Auto-update bom-aio dependencies"
          body: |
            This PR updates the `dependencyManagement` section in `bom-aio/pom.xml`
            based on the effective dependencies resolved from `bom-aio-origin/pom.xml`.

            Generated by GitHub Actions UpdateBOMAIODependencies workflow.
          branch: dependa-bom-aio
          base: bom-aio          # 目标分支
          delete-branch: true
          labels: |
            automated
            dependencies
