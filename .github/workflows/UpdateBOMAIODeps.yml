name: UpdateBOMAIODeps

on:
  workflow_dispatch:          # 手动触发
  schedule:
    # 每天 UTC 时间 20:00 自动运行（可按需调整）
    - cron: '0 20 * * *'

permissions:
  contents: write             # 允许提交代码
  pull-requests: write        # 允许创建 PR

jobs:
  update-bom:
    runs-on: ubuntu-latest
    steps:
      - name: CheckoutRepository
        uses: actions/checkout@v5
        with:
          # 拉取完整历史，以便创建分支和 PR
          fetch-depth: 0

      - name: ImportGPGKey
        uses: crazy-max/ghaction-import-gpg@v3
        with:
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
      
      - name: SetupJDK25
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: SetupPython314
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: InstallPython314Deps
        run: pip install lxml

      - name: PublishArtifactsToMavenCentralByBatch
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}   # 假设你的 Maven GPG 插件配置或 settings.xml 使用这些变量
          OSSRH_TOKEN: ${{ secrets.OSSRH_TOKEN }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}      # 如果 Maven 配置需要明确 Key ID：
          JAVA_TOOL_OPTIONS: "-Dfile.encoding=UTF-8 "
          MAVEN_OPTS: "-Dfile.encoding=UTF-8 -Dsun.jnu.encoding=UTF-8 --add-opens=jdk.compiler/com.sun.tools.javac.processing=ALL-UNNAMED --add-opens=jdk.compiler/com.sun.tools.javac.code=ALL-UNNAMED --add-opens=jdk.compiler/com.sun.tools.javac.tree=ALL-UNNAMED --add-opens=jdk.compiler/com.sun.tools.javac.util=ALL-UNNAMED --add-opens=jdk.compiler/com.sun.tools.javac.model=ALL-UNNAMED"
        run: |
         echo "======================================= 版本发布开始 ==================================================================="
         echo "======================================= 1.本地预先编译一次整个项目 ======================================================"
         pwd                 
         mvn clean install -B -U 
         echo "======================================= 2.编译 os-dependencies ========================================================"
         cd os-dependencies       # 设置工作目录为 os-dependencies
         pwd
         mvn clean install -B -U 
         echo "======================================= 3.编译 meta-model =============================================================="
         cd ../
         cd meta-model
         mvn clean install -B -U 
         echo "======================================= 3.编译 meta-bom =============================================================="
         cd ../
         cd meta-bom
         mvn clean install -B -U 
         echo "======================================= 4.编译 meta-bom/bom-aio-origi =============================================================="
         cd bom-aio-origin
         mvn help:effective-pom -Doutput=effective-pom.xml
         echo "Effective POM 文件已生成，文件位置 meta-bom/bom-aio-origin/effective-pom.xml"
         cd ../
         cd ../
         pwd
         echo "====================== Python脚本执行开始 ================================"
         python .github/Python/UpdateBomDeps.py \
            --effective-pom meta-bom/bom-aio-origin/effective-pom.xml \
            --target-pom meta-bom/bom-aio/pom.xml
         echo "====================== Python脚本执行完成 ================================"

      - name: CheckForChanges
        id: git-check
        run: |
          git diff --quiet meta-bom/bom-aio/pom.xml || echo "changed=true" >> $GITHUB_OUTPUT

      - name: CreatePullRequest
        if: steps.git-check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(bom-aio): Sync deps from bom-aio-origin BOM"
          title: "chore(bom-aio): Sync dependencies from bom-aio-origin BOM"
          body: |
            This PR updates the `dependencyManagement` section in `bom-aio/pom.xml`
            based on the effective dependencies resolved from `bom-aio-origin/pom.xml`.

            Generated by GitHub Actions UpdateBOMAIODependencies workflow.
          branch: dependa-bom-aio # 发起PR的分支
          base: dependa     # 目标分支
          delete-branch: true
          add-paths: |
            meta-bom/bom-aio/pom.xml
            meta-bom/bom-aio-origin/effective-pom.xml
          labels: |
            auto:commit
            dependencies
